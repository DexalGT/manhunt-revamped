name: Release Manhunt Mod
on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like "v1.0.0"
  workflow_dispatch: # Allows you to manually trigger a release from the GitHub UI
    inputs:
      tag_name:
        description: 'Tag name for manual release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write # Required to create a release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 9.4.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
